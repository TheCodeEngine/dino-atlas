services:

  # ── Reverse Proxy ──
  traefik:
    image: traefik:v3.2
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=dino-atlas_frontend"
      - "--providers.docker.constraints=Label(`project`,`dino-atlas`)"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--entrypoints.web.address=:80"
    container_name: dino-atlas-traefik
    ports:
      - "5020:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./services/traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - frontend
      - tunnel-net

  # ── Frontend App ──
  app:
    build:
      context: ./frontend
      dockerfile: apps/app/Dockerfile
    labels:
      - "project=dino-atlas"
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.routers.app.priority=1"
      - "traefik.http.services.app.loadbalancer.server.port=80"
    networks:
      - frontend

  # ── Landing Page ──
  landing:
    build:
      context: ./frontend
      dockerfile: apps/landing/Dockerfile
    labels:
      - "project=dino-atlas"
      - "traefik.enable=true"
      - "traefik.http.routers.landing.rule=Host(`dino-atlas.local`) && PathPrefix(`/`)"
      - "traefik.http.routers.landing.entrypoints=web"
      - "traefik.http.routers.landing.priority=2"
      - "traefik.http.services.landing.loadbalancer.server.port=80"
    networks:
      - frontend
    profiles: [landing]

  # ── Rust API ──
  api:
    build:
      context: ./backend
      dockerfile: api/Dockerfile
    environment:
      - POCKETBASE_URL=${POCKETBASE_URL:-http://pocketbase:8090}
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:?Set POCKETBASE_ADMIN_EMAIL in .env}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:?Set POCKETBASE_ADMIN_PASSWORD in .env}
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars)}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - VALKEY_URL=redis://valkey:6379
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5020,https://dino-atlas.thecodeengine.com}
      - PORT=3001
      - RUST_LOG=${RUST_LOG:-info}
      - PIPER_BIN=piper
      - PIPER_MODEL=/app/tts/models/de_DE-thorsten-high.onnx
      - FFMPEG_BIN=ffmpeg
      - TTS_CACHE_DIR=/app/cache/tts
    labels:
      - "project=dino-atlas"
      - "traefik.enable=true"
      - "traefik.http.routers.api-auth.rule=PathPrefix(`/api/v1/auth`)"
      - "traefik.http.routers.api-auth.entrypoints=web"
      - "traefik.http.routers.api-auth.priority=20"
      - "traefik.http.routers.api-auth.middlewares=auth-rate-limit@file"
      - "traefik.http.routers.api-auth.service=api"
      - "traefik.http.routers.api.rule=PathPrefix(`/api/v1`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=10"
      - "traefik.http.routers.api.middlewares=api-rate-limit@file"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    depends_on:
      - pocketbase
    networks:
      - frontend
      - backend

  # ── PocketBase ──
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    environment:
      - PB_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL:?Set POCKETBASE_ADMIN_EMAIL in .env}
      - PB_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD:?Set POCKETBASE_ADMIN_PASSWORD in .env}
    ports:
      - "127.0.0.1:5021:8090"
    volumes:
      - pocketbase_data:/pb_data
    labels:
      - "traefik.enable=false"
    networks:
      - frontend
      - backend

  # ── Valkey (Job Queue) ──
  valkey:
    image: valkey/valkey:8-alpine
    volumes:
      - valkey_data:/data
    labels:
      - "traefik.enable=false"
    networks:
      - backend

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  tunnel-net:
    external: true

volumes:
  pocketbase_data:
  valkey_data:
  tts-cache:
